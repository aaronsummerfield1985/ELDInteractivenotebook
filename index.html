<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systematic ELD Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --eld-green: #4f7942;
            --eld-dark: #2d4a27;
        }
        .bg-eld { background-color: var(--eld-green); }
        .text-eld { color: var(--eld-green); }
        .border-eld { border-color: var(--eld-green); }
        .hover-bg-eld:hover { background-color: var(--eld-dark); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--eld-green); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <header class="bg-white border-b-4 border-eld shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-eld rounded-lg flex items-center justify-center text-white font-bold text-2xl shadow-inner">
                    ELD
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900">Systematic ELD Portal</h1>
                    <p class="text-sm text-slate-500 font-medium italic">Section Navigation Dashboard</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-64">
                <input type="text" id="sectionSearch" placeholder="Search sections..." 
                    class="w-full pl-10 pr-4 py-2 rounded-full border border-slate-200 focus:outline-none focus:ring-2 focus:ring-eld focus:border-transparent transition-all">
                <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Workbook 1 -->
            <section class="workbook-section">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                        <span class="inline-block px-3 py-1 rounded-full bg-eld/10 text-eld text-xs font-bold uppercase tracking-wider mb-2">Unit Four</span>
                        <h2 class="text-xl font-bold text-slate-900">Writing to a Prompt</h2>
                    </div>
                    <div class="p-6 space-y-4" id="w1-sections"></div>
                </div>
            </section>

            <!-- Workbook 2 -->
            <section class="workbook-section">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                        <span class="inline-block px-3 py-1 rounded-full bg-orange-100 text-orange-700 text-xs font-bold uppercase tracking-wider mb-2">Secondary ELD Course 2</span>
                        <h2 class="text-xl font-bold text-slate-900">Listening and Speaking to a Prompt</h2>
                    </div>
                    <div class="p-6 space-y-4" id="w2-sections"></div>
                </div>
            </section>

        </div>
    </main>

    <footer class="max-w-6xl mx-auto px-4 py-12 text-center text-slate-400 text-sm">
        <p>© 2025 E.L. Achieve — Interactive Notebook Navigation Portal</p>
    </footer>

    <script>
        const workbookData = {
            writing: [
                { id: 1, title: "Section One", range: "pp. 2-17", lessons: ["Lesson One", "Lesson Two", "Lesson Three", "Lesson Four", "Lesson Five"] },
                { id: 2, title: "Section Two", range: "pp. 18-32", lessons: ["Lesson One", "Lesson Two", "Lesson Three", "Lesson Four"] },
                { id: 3, title: "Section Three", range: "pp. 33-50", lessons: ["Lesson One", "Lesson Two", "Lesson Three", "Lesson Four", "Lesson Five", "Lesson Six"] }
            ],
            speaking: [
                { id: 1, title: "Section One", range: "pp. 4-25", lessons: ["Lesson One", "Lesson Two", "Lesson Three", "Lesson Four", "Lesson Five"] },
                { id: 2, title: "Section Two", range: "pp. 26-42", lessons: ["Lesson One", "Lesson Two", "Lesson Three", "Lesson Four", "Lesson Five", "Lesson Six"] }
            ]
        };

        function createSectionCard(section, colorClass, prefix) {
            const fileName = `${prefix}_${section.id}.html`;
            const a = document.createElement('a');
            a.href = fileName;
            a.className = `section-card group block p-5 rounded-2xl border border-slate-100 hover:border-${colorClass}-200 hover:bg-${colorClass}-50/30 transition-all no-underline`;
            
            a.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="text-lg font-bold text-slate-800 group-hover:text-${colorClass}-700 transition-colors">${section.title}</h3>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-tight">${section.range}</span>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-[10px] font-mono text-slate-300 group-hover:text-${colorClass}-400 transition-colors font-bold">${fileName}</span>
                        <div class="w-8 h-8 rounded-full bg-white border border-slate-100 flex items-center justify-center text-${colorClass}-400 group-hover:bg-${colorClass}-500 group-hover:text-white transition-all shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5l7 7-7 7"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2 pt-2 border-t border-slate-50">
                    ${section.lessons.map(l => `<span class="text-[11px] px-2 py-0.5 bg-white border border-slate-100 text-slate-500 rounded-md">${l}</span>`).join('')}
                </div>
            `;
            return a;
        }

        function renderAll() {
            const w1Container = document.getElementById('w1-sections');
            workbookData.writing.forEach(sec => {
                w1Container.appendChild(createSectionCard(sec, 'green', 'wtp'));
            });

            const w2Container = document.getElementById('w2-sections');
            workbookData.speaking.forEach(sec => {
                w2Container.appendChild(createSectionCard(sec, 'orange', 'ltp'));
            });
        }

        document.getElementById('sectionSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.section-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });

        window.onload = renderAll;
    </script>
</body>
</html>
